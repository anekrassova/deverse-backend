services:
  mysql:
    image: mysql:8.0
    container_name: diploma-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: '00000000'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: social_network_for_developers
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-p00000000']
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: diploma-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
# потом сделать чтобы minio bucket не был private (для фронта)
  minio-init:
    image: minio/mc:latest
    container_name: diploma-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
      MINIO_BUCKET: diploma-images
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD 2>/dev/null; do
        echo 'waiting for minio...';
        sleep 1;
      done;
      mc mb -p local/$$MINIO_BUCKET || true;
      mc anonymous set download local/$$MINIO_BUCKET || true;
      echo 'minio bucket ready';
      "

volumes:
  mysql_data:
  minio_data:
